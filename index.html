<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wie atzig, fotzig oder mausig bist du?</title>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

<div class="quiz-container" style="background-color: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; padding: 30px; box-sizing: border-box;">
    <h1 style="text-align: center; color: #2c3e50; margin-bottom: 30px; font-size: 1.6rem;">Wie atzig, fotzig oder mausig bist du?</h1>
    
    <div id="quiz-box">
        <div class="question" id="question-text" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: #34495e;">Frage wird geladen...</div>
        <div class="answers" id="answer-buttons" style="display: flex; flex-direction: column; gap: 12px;"></div>
        <div class="progress" id="progress-text" style="margin-top: 20px; text-align: center; font-size: 0.9rem; color: #7f8c8d;">Frage 1 von 13</div>
    </div>

    <div id="result-box" class="result-container" style="display: none; text-align: center;">
        <div class="result-title" id="result-name" style="font-size: 1.8rem; font-weight: bold; color: #27ae60; margin-bottom: 15px;">Dein Ergebnis</div>
        <div class="result-desc" id="result-description" style="font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px;">Beschreibung</div>
        <button class="restart-btn" id="restart-button" style="background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 1rem; border-radius: 5px; cursor: pointer; transition: background-color 0.2s;">Quiz neustarten</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "1. Du hast eine Tube Senf. Was machst du damit?",
            answers: [
                { text: "Ich mach ihn auf meinen Kuchen.", type: "atzig" },
                { text: "Ich überrede jemand anderen, sich den Senf auf den Kuchen zu machen.", type: "fotzig" },
                { text: "Mag ich gar nicht so gerne, sorry.", type: "mausig" }
            ]
        },
        {
            question: "2. Du wirfst einen Pass. Der Receiver kommt ganz knapp nicht mehr an die Scheibe. Wie reagierst Du?",
            answers: [
                { text: "Ich schreie sofort: \"Defense!!\"", type: "atzig" },
                { text: "Nichts. War halt ein Receiver Error.", type: "fotzig" },
                { text: "Sorry, der Wurf war nicht gut genug.", type: "mausig" }
            ]
        },
        {
            question: "3. Ihr spielt gegen ein Ultimate-Frisbee-Team, das euch deutlich unterlegen ist. Es sieht so aus, als könnten sie ihren ersten Punkt machen. Du könntest die Frisbee aber noch abfangen. Was machst Du?",
            answers: [
                { text: "Ich springe spektakulär dazwischen, fange die Frisbee ab und baue das Spiel ganz entspannt wieder auf.", type: "atzig" },
                { text: "Ich pflücke die Frisbee aus der Luft und werfe sie danach extra arrogant weiter.", type: "fotzig" },
                { text: "Ach komm, es ist doch schön, wenn sie auch mal einen Punkt machen.", type: "mausig" }
            ]
        },
        {
            question: "4. Du bist auf der Afterparty. Was machst Du?",
            answers: [
                { text: "Ich hole den Partysieg für das Team.", type: "atzig" },
                { text: "Ich gehe gar nicht erst hin.", type: "fotzig" },
                { text: "Ich schaue, dass alle genug Wasser trinken.", type: "mausig" }
            ]
        },
        {
            question: "5. Du übernimmst eine Aufgabe für das Turnier. Was machst Du?",
            answers: [
                { text: "Ich bringe die Musikbox mit und habe eine richtig gute Playlist vorbereitet.", type: "atzig" },
                { text: "Ich bin Flipmaster und hole bei jedem Spiel die Offence.", type: "fotzig" },
                { text: "Ich bin Snack-Beauftragte:r und sorge dafür, dass alle etwas essen können – auch vegan oder glutenfrei.", type: "mausig" }
            ]
        },
        {
            question: "6. Picknick im Park, du:",
            answers: [
                { text: "kommst zu spät, hast aber als Entschuldigung Spezi für alle mitgebracht.", type: "atzig" },
                { text: "hast heimlich Wasserpistolen eingepackt und überraschst alle mit einer Abkühlung.", type: "fotzig" },
                { text: "hast Kuchen für alle gebacken.", type: "mausig" }
            ]
        },
        {
            question: "7. Jemand fällt im Training hin und callt „Injury“. Was machst Du?",
            answers: [
                { text: "Ich biete der verletzten Person erst mal Snacks an.", type: "atzig" },
                { text: "Ich sage, dass es Verletzungen gibt, die deutlich mehr weh tun.", type: "fotzig" },
                { text: "Ich hole ein Kühlpack und kümmere mich darum.", type: "mausig" }
            ]
        },
        {
            question: "8. Was ist dein Sonnenschutz?",
            answers: [
                { text: "Eine Kappe", type: "atzig" },
                { text: "Eine Sonnenbrille", type: "fotzig" },
                { text: "Ein Anglerhut", type: "mausig" }
            ]
        },
        {
            question: "9. Jemand vertippt sich im Chat und es entsteht ein lustiges Wort. Was machst Du?",
            answers: [
                { text: "Ich sehe die Nachricht leider erst viel zu spät und verpasse den Moment.", type: "atzig" },
                { text: "Ich ziehe die Person natürlich ein bisschen damit auf.", type: "fotzig" },
                { text: "Ich benutze einfach das richtige Wort in meiner Antwort, ohne jemanden zu verbessern.", type: "mausig" }
            ]
        },
        {
            question: "10. Turnier vorbei – die Duschparty beginnt. Was passiert?",
            answers: [
                { text: "Die Box wird aufgedreht und bei „Starships“ wird erst mal performt.", type: "atzig" },
                { text: "Ich mache mich darüber lustig, wie andere gespielt haben.", type: "fotzig" },
                { text: "Ich unterhalte mich mit allen und sage ihnen, wie toll sie gespielt haben.", type: "mausig" }
            ]
        },
        {
            question: "11. Ihr steht mit dem Team auf der Line, aber das andere Team braucht ewig. Was machst Du?",
            answers: [
                { text: "Ich übe einen Handstand und zeige meinen besten Radschlag.", type: "atzig" },
                { text: "Ich starte schon mal einen Pre-Call.", type: "fotzig" },
                { text: "Ich warte einfach entspannt.", type: "mausig" }
            ]
        },
        {
            question: "12. Das Motto eines Turniers ist „Pirat“. Was ziehst Du an?",
            answers: [
                { text: "Augenbinde und Anglerhut als improvisierter Piratenhut.", type: "atzig" },
                { text: "Normale Sportsachen, aber ich habe einen Säbel, der natürlich als Armverlängerung zum Scheibenabfälschen dient.", type: "fotzig" },
                { text: "Eine Prinzessinnen-Verkleidung – schließlich wurde ich von Piraten entführt.", type: "mausig" }
            ]
        },
        {
            question: "13. Puzzleabend. Welche Rolle übernimmst Du?",
            answers: [
                { text: "Ich puzzele einfach wild die Elemente aus der Mitte zusammen.", type: "atzig" },
                { text: "Ich mache den Rand und kommentiere danach nur noch das Werk der anderen.", type: "fotzig" },
                { text: "Ich suche für alle die passenden Teile.", type: "mausig" }
            ]
        }
    ];

    const profiles = {
        atzig: {
            name: "atzig",
            desc: "Du bist absolut atzig! Immer für eine wilde Aktion zu haben, bringst den Vibe aufs Feld und nimmst das Leben mit einer ordentlichen Portion Humor. Wo du bist, ist die Party nicht weit."
        },
        fotzig: {
            name: "fotzig",
            desc: "Du bist total fotzig! Voller Tatendrang, ehrgeizig und immer mit einem leicht arroganten oder ironischen Spruch auf den Lippen. Du drückst den Dingen kompromisslos deinen eigenen Stempel auf."
        },
        mausig: {
            name: "mausig",
            desc: "Du bist herrlich mausig! Die Ruhe selbst, unfassbar fürsorglich und die gute Seele der Truppe. Du hältst dich lieber im Hintergrund auf, sorgst aber im Stillen dafür, dass der Laden läuft."
        }
    };

    let currentQuestionIndex = 0;
    let scores = { atzig: 0, fotzig: 0, mausig: 0 };

    function startQuiz() {
        currentQuestionIndex = 0;
        scores = { atzig: 0, fotzig: 0, mausig: 0 };
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';
        showQuestion();
    }

    function showQuestion() {
        const currentQuestion = quizData[currentQuestionIndex];
        document.getElementById('question-text').innerText = currentQuestion.question;
        document.getElementById('progress-text').innerText = `Frage ${currentQuestionIndex + 1} von ${quizData.length}`;
        
        const answerButtonsContainer = document.getElementById('answer-buttons');
        answerButtonsContainer.innerHTML = '';

        currentQuestion.answers.forEach(answer => {
            const button = document.createElement('button');
            button.innerText = answer.text;
            button.style.backgroundColor = '#ecf0f1';
            button.style.border = '2px solid #bdc3c7';
            button.style.border_radius = '6px';
            button.style.padding = '15px 20px';
            button.style.fontSize = '1rem';
            button.style.cursor = 'pointer';
            button.style.textAlign = 'left';
            button.style.width = '100%';
            button.style.boxSizing = 'border-box';
            button.style.color = '#333';
            button.style.marginBottom = '4px';

            button.onmouseover = function() {
                this.style.backgroundColor = '#3498db';
                this.style.color = '#fff';
                this.style.borderColor = '#2980b9';
            };
            button.onmouseout = function() {
                this.style.backgroundColor = '#ecf0f1';
                this.style.color = '#333';
                this.style.borderColor = '#bdc3c7';
            };

            button.addEventListener('click', function() {
                selectAnswer(answer.type);
            });
            answerButtonsContainer.appendChild(button);
        });
    }

    function selectAnswer(type) {
        scores[type]++;
        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';

        let winner = 'atzig';
        if (scores.fotzig > scores[winner]) winner = 'fotzig';
        if (scores.mausig > scores[winner]) winner = 'mausig';

        document.getElementById('result-name').innerText = `Du bist: ${profiles[winner].name}!`;
        document.getElementById('result-description').innerText = profiles[winner].desc;
    }

    document.getElementById('restart-button').addEventListener('click', startQuiz);

    if (document.readyState === 'interactive' || document.readyState === 'complete') {
        startQuiz();
    } else {
        document.addEventListener('DOMContentLoaded', startQuiz);
    }
</script>

</body>
</html>
