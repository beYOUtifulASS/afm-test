<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFM-Snackline Edition Quiz</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #e5ab3c 0%, #1e6fa6 45%, #b54a85 100%);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .quiz-container {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 30px;
            width: 90%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin: 20px 0;
        }
        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
        }
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 25px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress {
            height: 100%;
            width: 0%;
            background: #e5ab3c;
            transition: width 0.3s ease;
        }
        .question-card {
            display: none;
        }
        .question-card.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.4;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            border: none;
            padding: 15px 20px;
            margin-bottom: 12px;
            width: 100%;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .option-btn:hover {
            background: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        #result-screen {
            display: none;
        }
        #result-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        .triangle-container {
            position: relative;
            width: 320px;
            height: 280px;
            margin: 25px auto;
        }
        .triangle-svg {
            width: 100%;
            height: 100%;
        }
        .dot {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transform: translate(-7px, -7px);
            z-index: 10;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
            transition: all 0.5s ease;
        }
        .my-dot {
            background-color: #00ebff;
            border: 2px solid #ffffff;
        }
        .friend-dot {
            background-color: #ff007c;
            border: 2px solid #ffffff;
        }
        .legend {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
            font-weight: bold;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .share-section {
            margin-top: 25px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .share-btn {
            background: #e5ab3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: background 0.2s;
        }
        .share-btn:hover {
            background: #cc9630;
        }
        .scores-text {
            font-size: 16px;
            margin: 15px 0;
            line-height: 1.5;
        }
        .comparison-box {
            background: rgba(255, 0, 124, 0.2);
            border: 1px dashed #ff007c;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <img src="nomster.png" alt="Quiz Logo" class="logo">
    <div class="subtitle">💙 ATZIG • 🩷 FOTZIG • 💛 MAUSIG</div>

    <div id="progress-container">
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="questions-target"></div>
    </div>

    <div id="result-screen">
        <h2>Deine Auswertung</h2>
        <div id="comparison-notification" class="comparison-box" style="display: none;">
            📌 Du siehst auch das Ergebnis der Person, die dir den Link geschickt hat!
        </div>
        
        <div class="triangle-container">
            <div id="my-point" class="dot my-dot"></div>
            <div id="friend-point" class="dot friend-dot" style="display: none;"></div>
            
            <svg class="triangle-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <polygon points="50,5 95,85 5,85" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="0.8"/>
                <line x1="50" y1="5" x2="50" y2="85" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2" stroke-width="0.5"/>
                <line x1="5" y1="85" x2="72.5" y2="45" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2" stroke-width="0.5"/>
                <line x1="95" y1="85" x2="27.5" y2="45" stroke="rgba(255,255,255,0.2)" stroke-dasharray="2" stroke-width="0.5"/>
                <text x="50" y="14" fill="#00ebff" font-size="6" font-weight="bold" text-anchor="middle">ATZIG (A)</text>
                <text x="92" y="92" fill="#ff007c" font-size="6" font-weight="bold" text-anchor="end">FOTZIG (B)</text>
                <text x="8" y="92" fill="#e5ab3c" font-size="6" font-weight="bold" text-anchor="start">MAUSIG (C)</text>
            </svg>
        </div>

        <div class="legend">
            <div class="legend-item"><span style="color:#00ebff">●</span> Dein Typ</div>
            <div id="friend-legend" class="legend-item" style="display: none;"><span style="color:#ff007c">●</span> Ersteller*in</div>
        </div>

        <div class="scores-text" id="scores-display"></div>

        <div class="share-section">
            <p style="margin: 0 0 10px 0; font-size: 14px;">Lass andere dein Ergebnis im Dreieck sehen! Teile diesen Link:</p>
            <button class="share-btn" onclick="copyShareLink()">Link kopieren 📋</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        {
            q: "Du hast eine Tube Senf, was machst du damit?",
            a: "Ich mach ihn auf meinen Kuchen",
            b: "Ich bringe jemand anderen dazu, ihn sich auf den Kuchen zu machen",
            c: "Mag ich gar nicht so gerne, Sorry"
        },
        {
            q: "Du wirfst einen Wurf und der Fänger kommt knapp nicht dran, was machst du?",
            a: "Mannschaft anschreien: \"Defense!\"",
            b: "Nichts, war ein receiver error",
            c: "Entschuldigen"
        },
        {
            q: "Ihr spielt gegen ein Team, das überhaupt keine Chance gegen euch hat. Es sieht so aus, als ob sie einen Punkt machen könnten, aber du hast die Möglichkeit die Frisbee abzufangen.",
            a: "Ich springe ultrakrass dazwischen und baue das Spiel wieder entspannt auf",
            b: "Ich greife die Frisbee in der Luft ab und mache einen ultra arroganten Wurf",
            c: "Ach komm, es ist doch schön, wenn sie auch mal einen Punkt machen"
        },
        {
            q: "Du bist auf der Afterparty. Du:",
            a: "Machst beim Bierrace mit",
            b: "Gehst nicht hin",
            c: "Schaust, dass alle genug Wasser trinken"
        },
        {
            q: "Du übernimmst eine Aufgabe für das Turnier:",
            a: "Du bringst die Musikbox mit und hast eine coole Playlist gemacht",
            b: "Du bist Flipmaster und holst bei jedem Spiel die Offence",
            c: "Du bist Snackbeauftragte*r und holst von allem etwas, damit auch Vegane und glutenfreie Leute was essen können"
        },
        {
            q: "Picknick im Park, du:",
            a: "Kommst zu spät, hast aber als Entschuldigung noch Spezi mitgebracht",
            b: "Hast heimlich Wasserpistolen eingepackt und überraschst die anderen mit einer kleinen Abkühlung",
            c: "Hast Kuchen für alle gebacken"
        },
        {
            q: "Jemand fällt im Training hin und callt injury, du:",
            a: "Bietest der verletzten Person ein paar Snacks an",
            b: "Sagst, dass es Verletzungen gibt, die mehr weh tun",
            c: "Besorgst ein Kühlpack"
        },
        {
            q: "Was ist dein Sonnenschutz?",
            a: "Kappe",
            b: "Sonnenbrille",
            c: "Anglerhut"
        },
        {
            q: "Jemand hat sich bei einer Nachricht im Chat vertippt und dabei ist ein lustiges Wort entstanden, du:",
            a: "Liest die Nachricht viel zu spät um zu reagieren",
            b: "Ziehst die Person damit auf",
            c: "Du antwortest und benutzt das richtige Wort, ohne die andere Person zu verbessern"
        },
        {
            q: "Das Turnier ist vorbei, die Duschparty beginnt:",
            a: "Es wird erst mal die Box aufgedreht und dann wird zu „Starships“ performt",
            b: "Du machst dich darüber lustig, wie andere gespielt haben",
            c: "Du unterhältst dich beim Duschen mit den anderen und sagst, wie toll sie waren"
        },
        {
            q: "Ihr steht mit dem Team auf der Line bereit, aber das andere braucht sehr lange.",
            a: "Du übst erst mal einen Handstand und zeigst wie dein Radschlag aussieht",
            b: "Du startest einen Pre-Call",
            c: "Wartest"
        },
        {
            q: "Es gibt das Motto „Pirat“ bei einem Turnier, was hast Du an?",
            a: "Augenbinde, Anglerhut als Piratenhut umfunktioniert",
            b: "Säbel, mit dem du als Armverlängerung die Scheiben wegschlägst",
            c: "Prinzessin (die von den Piraten entführt wurde)"
        },
        {
            q: "Puzzleabend:",
            a: "Du puzzelst Elemente aus der Mitte zusammen",
            b: "Du macht den Rand und stehst danach einfach rum und kommentierst das Gelingen der anderen",
            c: "Du suchst für andere die Teile"
        }
    ];

    let currentQuestionIdx = 0;
    let scores = { a: 0, b: 0, c: 0 };
    let friendScores = null;

    function parseUrlParams() {
        const params = new URLSearchParams(window.location.search);
        if (params.has('a') && params.has('b') && params.has('c')) {
            friendScores = {
                a: parseFloat(params.get('a')),
                b: parseFloat(params.get('b')),
                c: parseFloat(params.get('c'))
            };
        }
    }

    function initQuiz() {
        parseUrlParams();
        const target = document.getElementById('questions-target');
        
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = `question-card ${idx === 0 ? 'active' : ''}`;
            card.id = `q-${idx}`;
            
            card.innerHTML = `
                <div class="question-text">${idx + 1}. ${q.q}</div>
                <div class="options-list">
                    <button class="option-btn" onclick="submitAnswer('a')"><b>A:</b> ${q.a}</button>
                    <button class="option-btn" onclick="submitAnswer('b')"><b>B:</b> ${q.b}</button>
                    <button class="option-btn" onclick="submitAnswer('c')"><b>C:</b> ${q.c}</button>
                </div>
            `;
            target.appendChild(card);
        });
        updateProgressBar();
    }

    function updateProgressBar() {
        const percent = (currentQuestionIdx / questions.length) * 100;
        document.getElementById('progress').style.width = `${percent}%`;
    }

    function submitAnswer(type) {
        scores[type]++;
        document.getElementById(`q-${currentQuestionIdx}`).classList.remove('active');
        currentQuestionIdx++;
        
        if (currentQuestionIdx < questions.length) {
            document.getElementById(`q-${currentQuestionIdx}`).classList.add('active');
            updateProgressBar();
        } else {
            showResults();
        }
    }

    function calculateCoordinates(aPerc, bPerc, cPerc) {
        const total = aPerc + bPerc + cPerc;
        const a = aPerc / total;
        const b = bPerc / total;
        const c = cPerc / total;
        const x = a * 50 + b * 95 + c * 5;
        const y = a * 5 + b * 85 + c * 85;
        return { x: x + '%', y: y + '%' };
    }

    function showResults() {
        document.getElementById('progress-container').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').classList.add('active');

        const totalAnswers = questions.length;
        const aPct = (scores.a / totalAnswers) * 100;
        const bPct = (scores.b / totalAnswers) * 100;
        const cPct = (scores.c / totalAnswers) * 100;

        const myPos = calculateCoordinates(aPct, bPct, cPct);
        const myPointEl = document.getElementById('my-point');
        myPointEl.style.left = myPos.x;
        myPointEl.style.top = myPos.y;

        document.getElementById('scores-display').innerHTML = `
            Du bist zu:<br>
            <b>💙 ${aPct.toFixed(0)}% Atzig</b> | 
            <b>🩷 ${bPct.toFixed(0)}% Fotzig</b> | 
            <b>💛 ${cPct.toFixed(0)}% Mausig</b>
        `;

        if (friendScores) {
            const friendPos = calculateCoordinates(friendScores.a, friendScores.b, friendScores.c);
            const friendPointEl = document.getElementById('friend-point');
            friendPointEl.style.left = friendPos.x;
            friendPointEl.style.top = friendPos.y;
            friendPointEl.style.display = 'block';
            
            document.getElementById('friend-legend').style.display = 'flex';
            document.getElementById('comparison-notification').style.display = 'block';
        }
    }

    function copyShareLink() {
        const totalAnswers = questions.length;
        const aPct = ((scores.a / totalAnswers) * 100).toFixed(1);
        const bPct = ((scores.b / totalAnswers) * 100).toFixed(1);
        const cPct = ((scores.c / totalAnswers) * 100).toFixed(1);

        const baseUrl = window.location.href.split('?')[0];
        const shareUrl = `${baseUrl}?a=${aPct}&b=${bPct}&c=${cPct}`;

        navigator.clipboard.writeText(shareUrl).then(() => {
            alert("Der Link wurde in deine Zwischenablage kopiert! Schicke ihn jetzt deinen Freunden. 🚀");
        }).catch(err => {
            alert("Fehler beim Kopieren. Du kannst die URL manuell kopieren: " + shareUrl);
        });
    }

    window.onload = initQuiz;
</script>

</body>
</html>
